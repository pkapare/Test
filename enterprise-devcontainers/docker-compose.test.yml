    command: bash -c "/usr/local/bin/start-universal.sh && sleep infinity"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    secrets:
      - anthropic_api_key
      - github_token

  project-two:
    image: ${REGISTRY:-kapconreg.azurecr.io/devcontainers}/project-two:latest
    container_name: test-project-two
