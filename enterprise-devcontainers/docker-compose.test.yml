    command: bash -c "/usr/local/bin/start-universal.sh && sleep infinity"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    secrets:
      - anthropic_api_key
      - github_token

secrets:
  anthropic_api_key:
    environment: ANTHROPIC_API_KEY
  github_token:
    environment: GITHUB_TOKEN
