# =============================================================================
# Testing Compose — spin up any/all containers for local validation
# Usage:
#   docker compose -f docker-compose.test.yml up -d                # all
#   docker compose -f docker-compose.test.yml up -d project-two    # one service
#   docker compose -f docker-compose.test.yml down                 # teardown
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # TIER 0 — Core (CLI-only sanity check)
  # ---------------------------------------------------------------------------
  core:
    image: ${REGISTRY:-kapconreg.azurecr.io/devcontainers}/org-base-core:latest
    container_name: test-core
    hostname: core
    cap_add: [NET_ADMIN, NET_RAW]
    tmpfs:
      - /tmp:size=${TMPFS_TMP_SIZE:-256m}
      - /run:size=${TMPFS_RUN_SIZE:-64m}
    command: sleep infinity
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    secrets:
      - anthropic_api_key
      - github_token

  # ---------------------------------------------------------------------------
  # TIER 1 — IDE Variants
  # ---------------------------------------------------------------------------
  vscode-serveweb:
    image: ${REGISTRY:-kapconreg.azurecr.io/devcontainers}/org-base-vscode-serveweb:latest
    container_name: test-vscode-serveweb
    hostname: vscode-serveweb
    cap_add: [NET_ADMIN, NET_RAW]
    tmpfs:
      - /tmp:size=${TMPFS_TMP_SIZE:-256m}
      - /run:size=${TMPFS_RUN_SIZE:-64m}
    ports:
      - "${HOST_PORT_SERVEWEB_WEB:-8301}:${PORT_SERVE_WEB:-8229}"
    command: bash -c "/usr/local/bin/start-serve-web.sh && sleep infinity"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    secrets:
      - anthropic_api_key
      - github_token

  vscode-codeserver:
    image: ${REGISTRY:-kapconreg.azurecr.io/devcontainers}/org-base-vscode-codeserver:latest
    container_name: test-vscode-codeserver
    hostname: vscode-codeserver
    cap_add: [NET_ADMIN, NET_RAW]
    tmpfs:
      - /tmp:size=${TMPFS_TMP_SIZE:-256m}
      - /run:size=${TMPFS_RUN_SIZE:-64m}
    ports:
      - "${HOST_PORT_CODESERVER_WEB:-8302}:${PORT_CODE_SERVER:-8228}"
    command: bash -c "/usr/local/bin/start-code-server.sh && sleep infinity"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    secrets:
      - anthropic_api_key
      - github_token

  jetbrains:
    image: ${REGISTRY:-kapconreg.azurecr.io/devcontainers}/org-base-jetbrains:latest
    container_name: test-jetbrains
    hostname: jetbrains
    cap_add: [NET_ADMIN, NET_RAW]
    tmpfs:
      - /tmp:size=${TMPFS_TMP_SIZE:-256m}
      - /run:size=${TMPFS_RUN_SIZE:-64m}
    ports:
      - "${HOST_PORT_JETBRAINS_SSH:-2201}:${PORT_SSH:-2222}"
    command: bash -c "/usr/local/bin/start-ssh.sh && sleep infinity"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    secrets:
      - anthropic_api_key
      - github_token

  headless:
    image: ${REGISTRY:-kapconreg.azurecr.io/devcontainers}/org-base-headless:latest
    container_name: test-headless
    hostname: headless
    cap_add: [NET_ADMIN, NET_RAW]
    tmpfs:
      - /tmp:size=${TMPFS_TMP_SIZE:-256m}
      - /run:size=${TMPFS_RUN_SIZE:-64m}
    command: bash -c "/usr/local/bin/start-headless.sh && sleep infinity"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    secrets:
      - anthropic_api_key
      - github_token

  universal:
    image: ${REGISTRY:-kapconreg.azurecr.io/devcontainers}/org-base-universal:latest
    container_name: test-universal
    hostname: universal
    cap_add: [NET_ADMIN, NET_RAW]
